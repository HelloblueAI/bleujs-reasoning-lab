name: Bug report
description: Something broken in BleuJS Reasoning Lab (worker, API, eval, dashboard)
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please check [API_ACCESS.md](https://github.com/HelloblueAI/bleujs-reasoning-lab/blob/main/docs/deployment/API_ACCESS.md) if the custom domain returns a Cloudflare challenge.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect vs what you saw?
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL or endpoint
      placeholder: https://agi-primary.morning-star-e026.workers.dev/reason
    validations:
      required: false

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: curl command, worker:dev steps, etc.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard / UI
        - API (/reason, /metrics, /eval, /goals)
        - Eval harness
        - Local dev (Wrangler)
        - CI / docs
        - Other
    validations:
      required: true
