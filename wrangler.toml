# BleuJS Reasoning Lab — primary worker at agi.bleujs.org
# Run: pnpm run worker:dev | pnpm run deploy:worker:prod
name = "agi-primary"
main = "src/primary-agi-worker.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# Non-secret vars (use wrangler secret put for API keys)
[vars]
ENVIRONMENT = "development"

# Production route configuration
[env.production]
name = "agi-primary"
routes = ["agi.bleujs.org/*"]
workers_dev = true
[env.production.vars]
ENVIRONMENT = "production"

# Staging environment
[env.staging]
name = "agi-primary-staging"
routes = []
[env.staging.vars]
ENVIRONMENT = "staging"

# Development environment (no routes, use dev mode)
[env.development]
name = "agi-primary-dev"
routes = []
[env.development.vars]
ENVIRONMENT = "development"

# Optional KV: response cache + global llmRouting metrics (shared across isolates)
[[env.production.kv_namespaces]]
binding = "AGI_CACHE"
id = "04cce616bc4e473d9b421051f1b97e51"
preview_id = "4a12bd192b30481e8987bcef25f5f65f"

# Observability: structured logs and tracing (Workers Observability)
[observability]
enabled = true
head_sampling_rate = 1 